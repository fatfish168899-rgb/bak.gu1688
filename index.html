<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>PayBakong Secure Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/all.min.css" rel="stylesheet">
    <link href="assets/css/checkout.css?v=66.5" rel="stylesheet">
</head>
<body>

<!-- 核心数据配置块 (等待异步数据注入) -->
<div id="checkout-config" 
     data-khqr="" 
     data-order-no="" 
     data-merchant-order-no=""
     data-account-name=""
     data-amount="0.00" 
     data-remaining-seconds="0"
     data-bank-name="BAKONG"></div>

    <div class="checkout-container position-relative m-0 p-3">
        <div class="payment-card shadow-lg p-0 overflow-hidden">
            <!-- 顶部三行式辅助区 (V26.2) -->
            <div class="header-aux-area p-2 px-3" style="background: #fafafa; border-bottom: 1px solid #f0f0f0;">
                <!-- Row 1: 提示 + 语言切换 -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <small class="text-danger fw-bold" style="font-size: 0.72rem; letter-spacing: 0.5px;" data-i18n="timer_hint">请在规定时间内完成支付</small>
                    <div class="lang-switcher">
                        <span class="lang-btn" onclick="setLanguage('km')" id="lang-km">KM</span>
                        <span class="divider">|</span>
                        <span class="lang-btn" onclick="setLanguage('en')" id="lang-en">EN</span>
                        <span class="divider">|</span>
                        <span class="lang-btn" onclick="setLanguage('zh')" id="lang-zh">ZH</span>
                    </div>
                </div>

                <!-- Row 2: 8 银行图标 -->
                <div class="supported-banks-grid-compact mb-2">
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/ABABank.png" alt="ABA"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/AcledaBank.png" alt="Acleda"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/WingBank.png" alt="Wing"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/CanadiaBank.png" alt="Canadia"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/Bakong.png" alt="Bakong"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/Amret.png" alt="Amret"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/Pipay.png" alt="Pipay"></div>
                    <div class="bank-grid-item-mini"><img src="assets/img/allbank/TrueMoney.png" alt="TrueMoney"></div>
                </div>

                <!-- Row 3: 支持说明 (V30.0 绿色认证版) -->
                <div class="supported-banks-footer text-center mt-1">
                    <i class="fa-solid fa-circle-check"></i>
                    <span data-i18n="supported_banks_footer">支持以上所有 KHQR 银行</span>
                </div>
            </div>

            <!-- 二维码票据容器 (V29.0) -->
            <div class="qr-ticket-section">
                <!-- 红色票据 Header (V25.0) -->
                <div class="khqr-header">
                    <img src="assets/img/khqr_icon.svg" alt="KHQR">
                </div>

                <div class="p-3 pt-1">
                    <!-- 票据金额区域 (V25.0) -->
                    <div class="ticket-amount-wrapper">
                        <span class="ticket-amount-val" id="render-amt-int">0.</span><span class="ticket-amount-decimal" id="render-amt-dec">00</span>
                        <span class="ticket-amount-cur">USD</span>
                    </div>

                    <div class="ticket-divider"></div>

                    <div class="qr-area" id="qr-display-area">
                        <!-- 扫描窗口包装器 (V26.5) -->
                        <div class="qr-scanner-wrapper">
                            <div class="corner-tl"></div>
                            <div class="corner-tr"></div>
                            <div class="corner-bl"></div>
                            <div class="corner-br"></div>
                            <div class="qr-scan-line"></div>
                            <div id="qrcode" class="mx-auto d-flex justify-content-center align-items-center" style="min-height: 220px;">
                                <!-- 脉冲加载动画 (V66.5-LOADING) -->
                                <div class="qr-loading-pulse">
                                    <div class="pulse-ring"></div>
                                    <i class="fa-solid fa-qrcode text-muted opacity-25" style="font-size: 40px;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 票据底座栏 (V28.2) -->
                <div class="qr-bottom-bar" id="qr-footer-bar">
                    <div class="qr-bottom-left">
                        <!-- 长方形流光倒计时 (V43.0) -->
                        <div class="timer-rect-wrap">
                            <div class="timer-rect-inner">
                                <span class="qr-bottom-timer" id="timer-text">--:--</span>
                            </div>
                        </div>
                    </div>
                    <div class="qr-divider"></div>
                    <div class="qr-bottom-right">
                        <i class="fa-solid fa-user-tie me-1 opacity-75"></i>
                        <span class="qr-bottom-name" id="display-account-name">------</span>
                    </div>
                </div>
            </div>

            <div class="qr-action-group">  
                <button class="qr-save-btn btn w-100 py-2 border-0" onclick="saveQrCode()" id="save-qr-btn">
                    <i class="fa-solid fa-download me-1"></i>
                    <span data-i18n="save_qr">保存二维码到相册</span>
                </button>
            </div>

            <!-- 全局预览大图层 (V66.5-PREVIEW) -->
            <div class="qr-preview-overlay" id="qr-preview-overlay" onclick="closeQrPreview()">
                <div class="preview-content">
                    <img src="" id="qr-preview-img" alt="Long press to save">
                    <p class="preview-hint" data-i18n="save_hint">长按图片保存到相册</p>
                    <button class="preview-close-btn">&times;</button>
                </div>
            </div>

            <!-- 订单详情卡片 -->
            <div class="order-details-card" id="payment-info-area">
                <div class="detail-row">
                    <span class="detail-label">
                        <i class="fa-solid fa-receipt me-1 opacity-75"></i>
                        <span data-i18n="merchant_ref">商户单号</span>
                    </span>
                    <div class="detail-content">
                        <span class="detail-value" id="display-merchant-order-no">------</span>
                    </div>
                </div>
            </div>

            <!-- 全语言安全提醒 (V34.0) -->
            <div class="pay-warning-container d-none" id="pay-warning-global">
                <ol class="mb-0">
                    <li data-i18n="warn_1">If this is not your order, please do not pay.</li>
                    <li data-i18n="warn_2">Do not save this account number. Recipient details may change.</li>
                    <li data-i18n="warn_3">Pay exactly as shown for auto-credit.</li>
                </ol>
            </div>

        </div><!-- .payment-card END -->

        <!-- 支付等待状态 -->
        <div id="status-container">
            <div class="text-center mt-1">
                <div class="status-indicator">
                    <div class="pulse-dot"></div>
                    <span data-i18n="waiting_pay">正在等待支付...</span>
                </div>
            </div>
        </div>

        <!-- 侧边交互面板 -->
        <div class="side-panel-container">
            <div class="side-panel-wrapper left" id="contact-panel" style="display: none;">
                <div class="side-tab" id="contact-us-btn">
                    <span class="tab-text" data-i18n="contact_us">联系我们</span>
                    <i class="fa-solid fa-headset tab-icon"></i>
                </div>
            </div>

            <div class="side-panel-wrapper right" id="help-panel-tab" style="display: none;">
                <div class="side-tab" onclick="togglePanel('help-panel')">
                    <i class="fa-solid fa-circle-question tab-icon"></i>
                    <span class="tab-text" data-i18n="help_guide">帮助指引</span>
                </div>
            </div>
            
            <!-- 帮助抽屉面板 -->
            <div class="side-drawer help-drawer" id="help-panel" onclick="togglePanel('help-panel')">
                <div class="drawer-header">
                    <div class="header-icon-box"><i class="fa-solid fa-circle-question"></i></div>
                    <div class="header-text">
                        <div class="main-title" data-i18n="help">充值说明</div>
                        <div class="sub-title" data-i18n="click_close">点击图片可收回</div>
                    </div>
                </div>
                <div class="drawer-content p-0">
                    <img src="assets/img/topup_hint_en.jpg" class="img-fluid help-img" alt="Help">
                </div>
            </div>
        </div>

    </div>

<!-- 全局遮罩层 -->
<div class="side-panel-overlay" id="panel-overlay" onclick="closeAllPanels()"></div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="assets/js/checkout.js?v=66.5"></script>
</body>
</html>
